# ConnectWorld TURN Server Configuration
# Used for WebRTC relay when P2P connections fail (firewalls, NAT, etc.)

# Listening ports
listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

# Relay ports (UDP)
min-port=49152
max-port=65535

# Fingerprint
fingerprint

# Use long-term credential mechanism
lt-cred-mech

# Realm (use env or domain)
realm=connectworld.app

# Certificate paths (mounted from Let's Encrypt or self-signed)
cert=/etc/letsencrypt/live/connectworld.app/fullchain.pem
pkey=/etc/letsencrypt/live/connectworld.app/privkey.pem

# Logging
syslog
log-file=/var/log/turnserver/turnserver.log
simple-log

# Security
no-multicast-peers
no-tcp-relay

# Database for user accounts (turns encrypted)
userdb=/var/lib/turn/turndb

# Static user accounts (use env vars in production)
# user=connectworld:${TURN_PASSWORD}
