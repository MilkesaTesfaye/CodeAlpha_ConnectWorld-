# ─── ConnectWorld Nginx Init Config ──────────────────────────────────────────
# Used during SSL bootstrap when Let's Encrypt certificates don't exist yet.
# Runs on port 80 only to serve the ACME challenge for certbot verification.

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ─── Basic Settings ───────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # ─── Server Block ────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ─── Let's Encrypt ACME Challenge ────────────────────────────────
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ─── Health Check ────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ConnectWorld - ACME init mode\n";
            add_header Content-Type text/plain;
        }

        # ─── All Other Requests ──────────────────────────────────────────
        location / {
            add_header Content-Type text/plain always;
            return 200 "
╔══════════════════════════════════════════════════════╗
║              ConnectWorld - Setup Mode               ║
║                                                      ║
║  HTTPS has not been configured yet.                   ║
║                                                      ║
║  To obtain SSL certificates, run:                    ║
║    bash scripts/setup-ssl.sh                          ║
║                                                      ║
║  Or manually:                                        ║
║    docker compose run --rm certbot-init               ║
║    docker compose restart nginx-proxy                 ║
╚══════════════════════════════════════════════════════╝\n";
        }
    }
}
