# ─── Networks & Volumes ──────────────────────────────────────────────────────
networks:
  connectworld-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ─── Services ────────────────────────────────────────────────────────────────
services:
  # ─── MySQL Database ─────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: connectworld-mysql
    restart: unless-stopped
    networks:
      - connectworld-network
    ports:
      - "3307:3306" # Use non-standard host port to avoid conflicts
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-connectworld_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-connectworld}
      MYSQL_USER: ${MYSQL_USER:-connectworld}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-connectworld_pass}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ─── Redis Cache ────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: connectworld-redis
    restart: unless-stopped
    networks:
      - connectworld-network
    ports:
      - "6380:6379" # Use non-standard host port to avoid conflicts
    volumes:
      - redis-data:/data
    command: >
      redis-server --appendonly yes
      --requirepass ${REDIS_PASSWORD:-connectworld_redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ─── Server (API + WebSocket) ───────────────────────────────────────────
  server:
    build:
      context: ./server
      target: production
    container_name: connectworld-server
    restart: unless-stopped
    networks:
      - connectworld-network
    ports:
      - "5001:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://${MYSQL_USER:-connectworld}:${MYSQL_PASSWORD:-connectworld_pass}@mysql:3306/${MYSQL_DATABASE:-connectworld}
      REDIS_URL: redis://:${REDIS_PASSWORD:-connectworld_redis}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-deploy-access-jwt-secret-key-min-32-chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-deploy-refresh-jwt-secret-key-min-32-chars!}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/api/auth/google/callback}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost/api/auth/github/callback}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@connectworld.app}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    volumes:
      - server-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Client (Nginx + Static Files) ──────────────────────────────────────
  client:
    build:
      context: ./client
      target: production
    container_name: connectworld-client
    restart: unless-stopped
    networks:
      - connectworld-network
    ports:
      - "3000:80"
    depends_on:
      - server
    volumes:
      - ./client/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # ─── Nginx Reverse Proxy (SSL Termination) ──────────────────────────────
  nginx-proxy:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: connectworld-nginx
    restart: unless-stopped
    networks:
      - connectworld-network
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - client
      - server
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN:-connectworld.app}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ─── Certbot (One-time SSL Certificate Initialization) ──────────────────
  # Usage: docker compose run --rm certbot-init
  certbot-init:
    image: certbot/certbot:latest
    container_name: connectworld-certbot-init
    profiles:
      - init
    networks:
      - connectworld-network
    depends_on:
      nginx-proxy:
        condition: service_started
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN:-connectworld.app}
      EMAIL: ${SSL_EMAIL:-admin@connectworld.app}
    # NOTE: The certbot/certbot image has ENTRYPOINT: certbot, so we must
    # use entrypoint: here (not command:) to run through a shell.
    entrypoint: >
      sh -c "
        certbot certonly --webroot
        --webroot-path=/var/www/certbot
        --email $${EMAIL:-admin@connectworld.app}
        --agree-tos
        --no-eff-email
        --non-interactive
        -d $${DOMAIN:-connectworld.app}
        -d www.$${DOMAIN:-connectworld.app}
      "

  # ─── Certbot Renewal (Automatic Certificate Renewal) ────────────────────
  # Runs continuously, checks every 12 hours for renewal
  certbot-renew:
    image: certbot/certbot:latest
    container_name: connectworld-certbot-renew
    restart: unless-stopped
    networks:
      - connectworld-network
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
        trap exit TERM;
        while true; do
          certbot renew --quiet --no-self-upgrade;
          echo '[certbot] Next renewal check in 12 hours';
          sleep 43200 &
          wait $${!};
        done
      "

# ─── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  mysql-data:
  redis-data:
  server-logs:
  certbot-conf:   # SSL certificates from Let's Encrypt
  certbot-www:    # ACME challenge files for domain verification
