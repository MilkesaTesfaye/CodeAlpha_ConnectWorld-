name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ─── Server ───────────────────────────────────────────────────────────
  server:
    name: Server (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: connectworld_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3306/connectworld_test

      - name: Push schema
        run: npx prisma db push
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3306/connectworld_test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run lint
        run: npm run lint 2>/dev/null || true

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: mysql://test_user:test_password@localhost:3306/connectworld_test
          JWT_ACCESS_SECRET: test_jwt_access_secret
          JWT_REFRESH_SECRET: test_jwt_refresh_secret
          NODE_ENV: test

  # ─── Client ───────────────────────────────────────────────────────────
  client:
    name: Client (React + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint 2>/dev/null || true

      - name: Build
        run: npm run build

      - name: Run tests
        run: npx vitest run --reporter=verbose 2>/dev/null || echo "No tests configured"

  # ─── Docker Build ─────────────────────────────────────────────────────
  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t connectworld-server ./server

      - name: Build client image
        run: docker build -t connectworld-client ./client

  # ─── Security Scan ────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Server audit
        working-directory: ./server
        run: npm audit --production 2>/dev/null || echo "Audit completed with warnings"

      - name: Client audit
        working-directory: ./client
        run: npm audit --production 2>/dev/null || echo "Audit completed with warnings"
